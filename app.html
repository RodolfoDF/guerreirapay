function useSupabase(table,fieldMap){
  const[data,setData]=useState([]);const[loaded,setLoaded]=useState(false);
  const load=useCallback(async()=>{const{data:rows,error}=await sb.from(table).select('*').order('created_at',{ascending:true});if(!error&&rows){setData(rows.map(r=>{const o={};Object.entries(fieldMap).forEach(([j,d])=>{o[j]=r[d]});o._raw=r;return o}));}setLoaded(true);},[table]);
  useEffect(()=>{load();},[load]);
  const insert=useCallback(async item=>{const row={};Object.entries(fieldMap).forEach(([j,d])=>{if(item[j]!==undefined)row[d]=item[j]});const{data:ins,error}=await sb.from(table).insert(row).select().single();if(!error&&ins){const o={};Object.entries(fieldMap).forEach(([j,d])=>{o[j]=ins[d]});o._raw=ins;setData(p=>[...p,o]);return o}return null},[table,fieldMap]);
  const update=useCallback(async(id,item)=>{const row={};Object.entries(fieldMap).forEach(([j,d])=>{if(item[j]!==undefined)row[d]=item[j]});const{error}=await sb.from(table).update(row).eq('id',id);if(!error)setData(p=>p.map(d=>d.id===id?{...d,...item}:d))},[table,fieldMap]);
  const remove=useCallback(async id=>{const{error}=await sb.from(table).delete().eq('id',id);if(!error)setData(p=>p.filter(d=>d.id!==id))},[table]);
  return{data,loaded,save:setData,insert,update,remove,reload:load};
}

function Modal({open,onClose,title,children}){if(!open)return null;return(<div onClick={onClose} style={{position:"fixed",inset:0,zIndex:999,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(15,23,42,.55)",backdropFilter:"blur(4px)"}}><div onClick={e=>e.stopPropagation()} style={{background:"#1e293b",borderRadius:16,padding:"28px 32px",width:480,maxWidth:"94vw",maxHeight:"88vh",overflowY:"auto",boxShadow:"0 25px 60px rgba(0,0,0,.4)",color:"#e2e8f0"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}><h2 style={{margin:0,fontSize:20,fontWeight:700,color:"#f8fafc"}}>{title}</h2><button onClick={onClose} style={{background:"none",border:"none",color:"#94a3b8",fontSize:22,cursor:"pointer"}}>{"\u2715"}</button></div>{children}</div></div>);}
function ConfirmDialog({open,message,onConfirm,onCancel}){if(!open)return null;return(<div onClick={onCancel} style={{position:"fixed",inset:0,zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(15,23,42,.65)",backdropFilter:"blur(4px)"}}><div onClick={e=>e.stopPropagation()} style={{background:"#1e293b",borderRadius:14,padding:"24px 28px",width:360,maxWidth:"90vw",boxShadow:"0 25px 60px rgba(0,0,0,.5)",color:"#e2e8f0",textAlign:"center"}}><div style={{fontSize:36,marginBottom:12}}>{"\u26A0\uFE0F"}</div><p style={{fontSize:15,fontWeight:600,color:"#f8fafc",margin:"0 0 20px"}}>{message}</p><div style={{display:"flex",gap:12,justifyContent:"center"}}><button onClick={onCancel} style={btnSecondary}>Cancelar</button><button onClick={onConfirm} style={{padding:"10px 28px",background:"linear-gradient(135deg,#ef4444,#dc2626)",border:"none",borderRadius:8,color:"#fff",fontWeight:700,fontSize:14,cursor:"pointer"}}>Remover</button></div></div></div>);}
function useConfirm(){const[s,setS]=useState({open:false,message:"",resolve:null});const c=useCallback(m=>new Promise(r=>setS({open:true,message:m,resolve:r})),[]);const ok=useCallback(()=>{s.resolve?.(true);setS({open:false,message:"",resolve:null})},[s.resolve]);const no=useCallback(()=>{s.resolve?.(false);setS({open:false,message:"",resolve:null})},[s.resolve]);return[c,<ConfirmDialog open={s.open} message={s.message} onConfirm={ok} onCancel={no}/>];}

const inputStyle={width:"100%",padding:"10px 14px",background:"#0f172a",border:"1px solid #334155",borderRadius:8,color:"#e2e8f0",fontSize:14,fontFamily:"'DM Sans',sans-serif",outline:"none",boxSizing:"border-box"};

const btnPrimary={padding:"10px 24px",background:"linear-gradient(135deg,#2563eb,#1d4ed8)",border:"none",borderRadius:8,color:"#fff",fontWeight:700,fontSize:14,cursor:"pointer",fontFamily:"'DM Sans',sans-serif"};
const btnSecondary={padding:"10px 24px",background:"transparent",border:"1px solid #475569",borderRadius:8,color:"#cbd5e1",fontWeight:600,fontSize:14,cursor:"pointer",fontFamily:"'DM Sans',sans-serif"};
function Field({label,children}){return<div style={{marginBottom:16}}><label style={labelStyle}>{label}</label>{children}</div>;}
function StatusBadge({type}){const c={ativo:"#22c55e",concluido:"#3b82f6",cancelado:"#ef4444",aberto:"#f59e0b",fechado:"#8b5cf6"};const l={ativo:"Ativo",concluido:"Concluido",cancelado:"Cancelado",aberto:"Aberto",fechado:"Fechado"};return<span style={{display:"inline-block",padding:"3px 10px",borderRadius:20,fontSize:11,fontWeight:700,background:(c[type]||"#64748b")+"22",color:c[type]||"#64748b"}}>{l[type]||type}</span>;}

function StatCard({icon,label,value,sub}){return<Card><div style={{display:"flex",alignItems:"center",gap:14}}><div style={{width:48,height:48,borderRadius:12,display:"flex",alignItems:"center",justifyContent:"center",background:"linear-gradient(135deg,#2563eb22,#1d4ed822)",fontSize:22}}>{icon}</div><div><div style={{fontSize:12,color:"#94a3b8",fontWeight:600,marginBottom:4}}>{label}</div><div style={{fontSize:22,fontWeight:800,color:"#f8fafc"}}>{value}</div>{sub&&<div style={{fontSize:12,color:"#64748b",marginTop:2}}>{sub}</div>}</div></div></Card>;}

function PaymentCalendar({selectedDate,onSelect,payments}){
  const[vd,setVd]=useState(()=>{const d=new Date(selectedDate+"T12:00:00");return{y:d.getFullYear(),m:d.getMonth()};});
  const pDates=useMemo(()=>{const s=new Set();payments.forEach(p=>s.add(p.date));return s;},[payments]);
  const dim=new Date(vd.y,vd.m+1,0).getDate(),fdw=new Date(vd.y,vd.m,1).getDay();
  const mn=new Date(vd.y,vd.m).toLocaleDateString("pt-BR",{month:"long",year:"numeric"});
  const prev=()=>setVd(v=>{const d=new Date(v.y,v.m-1,1);return{y:d.getFullYear(),m:d.getMonth()};});
  const next=()=>setVd(v=>{const d=new Date(v.y,v.m+1,1);return{y:d.getFullYear(),m:d.getMonth()};});
  const goTd=()=>{const n=new Date();setVd({y:n.getFullYear(),m:n.getMonth()});onSelect(today());};
  const cells=[];for(let i=0;i<fdw;i++)cells.push(null);for(let d=1;d<=dim;d++)cells.push(d);const ts=today();
  return(<div style={{background:"#1e293b",borderRadius:14,padding:16}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}><button onClick={prev} style={{background:"none",border:"none",color:"#94a3b8",fontSize:18,cursor:"pointer",padding:"4px 8px"}}>{"\u2039"}</button><div style={{display:"flex",alignItems:"center",gap:10}}><span style={{fontSize:14,fontWeight:700,color:"#f8fafc",textTransform:"capitalize"}}>{mn}</span><button onClick={goTd} style={{background:"#2563eb22",border:"1px solid #2563eb44",borderRadius:6,color:"#3b82f6",fontSize:10,fontWeight:700,padding:"3px 8px",cursor:"pointer"}}>HOJE</button></div><button onClick={next} style={{background:"none",border:"none",color:"#94a3b8",fontSize:18,cursor:"pointer",padding:"4px 8px"}}>{"\u203A"}</button></div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:4}}>{["Dom","Seg","Ter","Qua","Qui","Sex","Sab"].map(d=><div key={d} style={{textAlign:"center",fontSize:10,fontWeight:700,color:"#64748b",padding:"4px 0"}}>{d}</div>)}</div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>{cells.map((day,i)=>{if(!day)return<div key={`e${i}`}/>;const ds=`${vd.y}-${String(vd.m+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;const sel=ds===selectedDate,td=ds===ts,hp=pDates.has(ds);return(<button key={day} onClick={()=>onSelect(ds)} style={{position:"relative",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"6px 2px",minHeight:40,borderRadius:8,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",background:sel?"linear-gradient(135deg,#2563eb,#1d4ed8)":hp?"#22c55e18":"transparent",border:td&&!sel?"1px solid #3b82f666":sel?"none":hp?"1px solid #22c55e30":"1px solid transparent"}}><span style={{fontSize:13,fontWeight:sel||hp?700:400,color:sel?"#fff":td?"#3b82f6":hp?"#4ade80":"#cbd5e1"}}>{day}</span>{hp&&<div style={{width:5,height:5,borderRadius:"50%",background:sel?"#0f172a":"#22c55e",marginTop:2}}/>}</button>);})}</div>
    <div style={{display:"flex",gap:16,marginTop:12,justifyContent:"center"}}><div style={{display:"flex",alignItems:"center",gap:5}}><div style={{width:8,height:8,borderRadius:"50%",background:"#22c55e"}}/><span style={{fontSize:10,color:"#64748b"}}>Com pagamentos</span></div><div style={{display:"flex",alignItems:"center",gap:5}}><div style={{width:8,height:8,borderRadius:"50%",background:"#3b82f6"}}/><span style={{fontSize:10,color:"#64748b"}}>Selecionado</span></div></div>
  </div>);
}

// ─── DASHBOARD (admin only) ───
function Dashboard({contractors,projects,contracts,payments}){
  const active=projects.filter(p=>p.status==="ativo").length;
  const activeContracts=contracts.length;
  const getPaid=cid=>payments.filter(p=>p.contractId===cid).reduce((s,p)=>s+(Number(p.amount)||0),0);
  const totalAllPaid=payments.reduce((s,p)=>s+(Number(p.amount)||0),0);
  return(<div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))",gap:16,marginBottom:28}}>
      <StatCard icon={"\u{1F3D7}\uFE0F"} label="Obras Ativas" value={active} sub={`de ${projects.length} total`}/>
      <StatCard icon={"\u{1F4CB}"} label="Contratos Ativos" value={activeContracts}/>
    </div>
    <h3 style={{fontSize:16,fontWeight:700,color:"#f8fafc",marginBottom:16}}>Resumo dos Contratos</h3>
    {contracts.length===0?<Card><p style={{color:"#64748b",fontSize:14}}>Nenhum contrato cadastrado.</p></Card>:
    <div style={{display:"grid",gap:12}}>
      {contracts.map(c=>{
        const con=contractors.find(x=>x.id===c.contractorId);
        const proj=projects.find(x=>x.id===c.projectId);
        const paid=getPaid(c.id);
        const pct=c.totalValue>0?Math.min(100,(paid/c.totalValue)*100):0;
        return(<Card key={c.id} style={{padding:"16px 20px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:8}}>
            <div><div style={{fontWeight:700,fontSize:15,color:"#f8fafc"}}>{con?.name||"-"}</div><div style={{fontSize:12,color:"#94a3b8",marginTop:3}}>{proj?.name||"-"}{c.description&&<> &middot; {c.description}</>}</div></div>
            <StatusBadge type={c.type}/>
          </div>
          <div style={{marginTop:12,display:"flex",alignItems:"center",gap:14}}>
            <div style={{padding:"8px 14px",borderRadius:8,background:"linear-gradient(135deg,#22c55e18,#16a34a10)",border:"1px solid #22c55e30"}}>
              <div style={{fontSize:9,color:"#86efac",fontWeight:700,textTransform:"uppercase",letterSpacing:.5,marginBottom:2}}>Total Pago</div>
              <div style={{fontSize:16,fontWeight:800,color:"#22c55e"}}>{fmt(paid)}</div>
            </div>
            {c.type==="fechado"&&c.totalValue>0&&<div style={{flex:1}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{fontSize:11,color:"#64748b"}}>de {fmt(c.totalValue)}</span><span style={{fontSize:11,color:"#64748b"}}>{pct.toFixed(0)}%</span></div>
              <div style={{height:5,background:"#334155",borderRadius:3,overflow:"hidden"}}><div style={{height:"100%",width:`${pct}%`,background:"linear-gradient(90deg,#2563eb,#22c55e)",borderRadius:3}}/></div>
            </div>}
          </div>
        </Card>);
      })}
      <Card style={{background:"linear-gradient(135deg,#3b82f610,#1d4ed808)",border:"1px solid #3b82f633",padding:"14px 20px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span style={{fontSize:14,fontWeight:700,color:"#3b82f6"}}>TOTAL GERAL PAGO</span>
        <span style={{fontSize:20,fontWeight:800,color:"#3b82f6"}}>{fmt(totalAllPaid)}</span>
      </Card>
    </div>}
  </div>);
}

// ─── CONTRACTORS ───
function Contractors({contractors,cApi}){
  const[modal,setModal]=useState(false),[edit,setEdit]=useState(null),[form,setForm]=useState({name:"",cpf:"",bank:"",bankAgency:"",bankAccount:"",pixKey:""}),[search,setSearch]=useState(""),[cf,cd]=useConfirm();
  const openNew=()=>{setForm({name:"",cpf:"",bank:"",bankAgency:"",bankAccount:"",pixKey:""});setEdit(null);setModal(true);};
  const openEdit=c=>{setForm({name:c.name,cpf:c.cpf||"",bank:c.bank||"",bankAgency:c.bankAgency||"",bankAccount:c.bankAccount||"",pixKey:c.pixKey||""});setEdit(c.id);setModal(true);};
  const save=async()=>{if(!form.name||!form.cpf)return;if(edit){await cApi.update(edit,form);}else{await cApi.insert({...form,id:genId()});}setModal(false);};
  const rm=async id=>{if(await cf("Remover este empreiteiro?"))await cApi.remove(id);};
  const filtered=contractors.filter(c=>c.name?.toLowerCase().includes(search.toLowerCase())||c.cpf?.includes(search));
  return(<div>
    <div style={{display:"flex",gap:12,marginBottom:20,flexWrap:"wrap"}}><input placeholder="Buscar por nome ou CPF..." value={search} onChange={e=>setSearch(e.target.value)} style={{...inputStyle,flex:1,minWidth:200}}/><button onClick={openNew} style={btnPrimary}>+ Novo Empreiteiro</button></div>
    {filtered.length===0?<EmptyState icon={"\u{1F477}"} text="Nenhum empreiteiro cadastrado."/>:
    <div style={{display:"grid",gap:12}}>{filtered.map(c=>(<Card key={c.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:12,padding:"18px 24px"}}>
      <div><div style={{fontWeight:700,fontSize:16,color:"#f8fafc"}}>{c.name}</div><div style={{fontSize:13,color:"#94a3b8",marginTop:4}}>CPF: {c.cpf} {c.bank&&<>&nbsp;| Banco: {c.bank}</>} &nbsp;| Ag: {c.bankAgency} &nbsp;| Conta: {c.bankAccount}</div>{c.pixKey&&<div style={{fontSize:12,color:"#64748b",marginTop:2}}>Pix: {c.pixKey}</div>}</div>
      <div style={{display:"flex",gap:8}}><button onClick={()=>openEdit(c)} style={{...btnSecondary,padding:"6px 14px",fontSize:12}}>Editar</button><button onClick={()=>rm(c.id)} style={{...btnSecondary,padding:"6px 14px",fontSize:12,borderColor:"#ef4444",color:"#ef4444"}}>Remover</button></div>
    </Card>))}</div>}
    <Modal open={modal} onClose={()=>setModal(false)} title={edit?"Editar Empreiteiro":"Novo Empreiteiro"}>
      <Field label="Nome Completo"><input style={inputStyle} value={form.name} onChange={e=>setForm({...form,name:e.target.value})}/></Field>
      <Field label="CPF"><input style={inputStyle} value={form.cpf} maxLength={14} onChange={e=>setForm({...form,cpf:cpfMask(e.target.value)})} placeholder="000.000.000-00"/></Field>
      <Field label="Banco"><input style={inputStyle} value={form.bank} onChange={e=>setForm({...form,bank:e.target.value})} placeholder="Ex: Bradesco, Itau, Caixa..."/></Field>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}><Field label="Agencia"><input style={inputStyle} value={form.bankAgency} onChange={e=>setForm({...form,bankAgency:e.target.value})}/></Field><Field label="Conta"><input style={inputStyle} value={form.bankAccount} onChange={e=>setForm({...form,bankAccount:e.target.value})}/></Field></div>
      <Field label="Chave Pix"><input style={inputStyle} value={form.pixKey} onChange={e=>setForm({...form,pixKey:e.target.value})}/></Field>
      <div style={{display:"flex",gap:12,justifyContent:"flex-end",marginTop:20}}><button onClick={()=>setModal(false)} style={btnSecondary}>Cancelar</button><button onClick={save} style={btnPrimary}>{edit?"Salvar":"Cadastrar"}</button></div>
    </Modal>{cd}</div>);
}

// ─── PROJECTS (admin only) ───
function Projects({projects,pApi}){
  const[modal,setModal]=useState(false),[edit,setEdit]=useState(null),[form,setForm]=useState({name:"",address:"",status:"ativo"}),[cf,cd]=useConfirm();
  const openNew=()=>{setForm({name:"",address:"",status:"ativo"});setEdit(null);setModal(true);};
  const openEdit=p=>{setForm({name:p.name,address:p.address||"",status:p.status||"ativo"});setEdit(p.id);setModal(true);};
  const rm=async id=>{if(await cf("Remover esta obra?"))await pApi.remove(id);};
  const save=async()=>{if(!form.name)return;if(edit){await pApi.update(edit,form);}else{await pApi.insert({...form,id:genId()});}setModal(false);};
  return(<div>

// ─── PAY LIST ───
function PayList({contractors,projects,contracts,payments}){
  const[sd,setSd]=useState(today()),[sp,setSp]=useState("all"),[co,setCo]=useState(false);
  const dp=payments.filter(p=>p.date===sd&&(sp==="all"||contracts.find(c=>c.id===p.contractId)?.projectId===sp));
  const g={};dp.forEach(p=>{const ct=contracts.find(c=>c.id===p.contractId);if(!ct)return;const con=contractors.find(c=>c.id===ct.contractorId);if(!con)return;if(!g[con.id])g[con.id]={contractor:con,items:[],total:0};const proj=projects.find(x=>x.id===ct.projectId);g[con.id].items.push({...p,project:proj?.name||"-",contractDesc:ct.description||""});g[con.id].total+=Number(p.amount);});
  const entries=Object.values(g),gt=entries.reduce((s,e)=>s+e.total,0);
  const whatsapp=()=>{let m=`*GUERREIRA PAY*\n*Lista de Pagamento*\nData: *${fmtDate(sd)}*\n--------------------------------\n\n`;entries.forEach(e=>{m+=`*${e.contractor.name}*\nCPF: ${e.contractor.cpf||""}\n`;if(e.contractor.bank)m+=`Banco: ${e.contractor.bank}\n`;m+=`Ag: ${e.contractor.bankAgency||""} | Conta: ${e.contractor.bankAccount||""}\n`;if(e.contractor.pixKey)m+=`Pix: ${e.contractor.pixKey}\n`;m+=`\n`;e.items.forEach(i=>{const ref=i.contractDesc?` - ref. ${i.contractDesc}`:"";m+=`Obra: ${i.project}\nValor: *${fmt(i.amount)}*${ref}\n`;});if(e.items.length>1)m+=`\nSubtotal ${e.contractor.name}: *${fmt(e.total)}*\n`;m+=`\n`;});m+=`--------------------------------\n*TOTAL GERAL: ${fmt(gt)}*\n\n_Guerreira Pay_`;window.open(`https://wa.me/?text=${encodeURIComponent(m)}`,"_blank");};
  return(<div>
    <Card style={{marginBottom:20}}><div style={{display:"flex",gap:16,alignItems:"flex-end",flexWrap:"wrap"}}><div><label style={labelStyle}>Data</label><button onClick={()=>setCo(!co)} style={{...inputStyle,width:200,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between"}}><span>{fmtDate(sd)}</span><span style={{fontSize:11,color:"#64748b"}}>{co?"\u25B2":"\u25BC"}</span></button></div><Field label="Filtrar por Obra"><select style={{...inputStyle,width:220}} value={sp} onChange={e=>setSp(e.target.value)}><option value="all">Todas</option>{projects.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}</select></Field><button onClick={whatsapp} style={{...btnPrimary,background:"linear-gradient(135deg,#25D366,#128C7E)",marginBottom:16}} disabled={!entries.length}>WhatsApp</button></div>{co&&<div style={{marginTop:16,maxWidth:380}}><PaymentCalendar selectedDate={sd} onSelect={d=>{setSd(d);setCo(false);}} payments={payments}/></div>}</Card>
    {!entries.length?<EmptyState icon={"\u{1F4C4}"} text={`Nenhum pagamento para ${fmtDate(sd)}.`}/>:
    <Card><h3 style={{margin:"0 0 4px",fontSize:16,fontWeight:700,color:"#f8fafc"}}>Lista - {fmtDate(sd)}</h3><p style={{margin:"0 0 16px",fontSize:13,color:"#64748b"}}>{entries.length} empreiteiro(s) | Total: {fmt(gt)}</p>
    <div style={{display:"grid",gap:16}}>{entries.map(e=>(<div key={e.contractor.id} style={{padding:16,borderRadius:10,background:"#0f172a",border:"1px solid #1e293b"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:8,marginBottom:12}}><div><div style={{fontWeight:700,fontSize:15,color:"#f8fafc"}}>{e.contractor.name}</div><div style={{fontSize:12,color:"#94a3b8",marginTop:2}}>CPF: {e.contractor.cpf}{e.contractor.bank&&` | ${e.contractor.bank}`}</div><div style={{fontSize:12,color:"#64748b",marginTop:1}}>Ag: {e.contractor.bankAgency} | Conta: {e.contractor.bankAccount}{e.contractor.pixKey&&` | Pix: ${e.contractor.pixKey}`}</div></div>
      {e.items.length>1&&<div style={{padding:"4px 12px",borderRadius:8,background:"#3b82f618",border:"1px solid #3b82f633"}}><span style={{fontSize:12,fontWeight:700,color:"#3b82f6"}}>Subtotal: {fmt(e.total)}</span></div>}</div>
      <div style={{display:"grid",gap:8}}>{e.items.map(i=>(<div key={i.id} style={{padding:"10px 14px",borderRadius:8,background:"#1e293b",border:"1px solid #334155"}}><div style={{fontSize:13,fontWeight:600,color:"#cbd5e1",marginBottom:4}}>{i.project}</div><div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}><span style={{fontSize:16,fontWeight:800,color:"#22c55e"}}>{fmt(i.amount)}</span>{i.contractDesc&&<span style={{fontSize:12,color:"#94a3b8"}}>referente {i.contractDesc}</span>}</div></div>))}</div>
    </div>))}</div>
    <div style={{marginTop:16,padding:"14px 16px",borderRadius:10,background:"linear-gradient(135deg,#3b82f618,#1d4ed810)",border:"1px solid #3b82f633",display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontSize:14,fontWeight:700,color:"#3b82f6"}}>TOTAL GERAL</span><span style={{fontSize:20,fontWeight:800,color:"#3b82f6"}}>{fmt(gt)}</span></div>
    </Card>}</div>);
}

  const pmApi=useSupabase('payments',paymentFields);
  const loaded=cApi.loaded&&pApi.loaded&&ctApi.loaded&&pmApi.loaded;
  useEffect(()=>{const i=setInterval(()=>{cApi.reload();pApi.reload();ctApi.reload();pmApi.reload();},30000);return()=>clearInterval(i);},[]);
  if(!loaded)return(<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:"#0a1628"}}><div style={{textAlign:"center"}}><GuerreiraLogo size={64}/><div style={{marginTop:12,fontWeight:800,fontSize:20,color:"#f8fafc"}}>Guerreira Pay</div><div style={{fontSize:12,color:"#64748b",marginTop:4}}>Carregando dados...</div></div></div>);
  const props={contractors:cApi.data,projects:pApi.data,contracts:ctApi.data,payments:pmApi.data,cApi,pApi,ctApi,pmApi};
  return(<div style={{minHeight:"100vh",background:"#0f172a",fontFamily:"'DM Sans',sans-serif",color:"#e2e8f0",paddingBottom:80}}>
    <main style={{padding:"20px 16px",maxWidth:1100,margin:"0 auto",width:"100%"}}>
      {tab==="dashboard"&&IS_ADMIN&&<Dashboard {...props}/>}
      {tab==="contractors"&&<Contractors {...props}/>}
      {tab==="projects"&&<Projects {...props}/>}
      {tab==="contracts"&&<Contracts {...props}/>}
      {tab==="payments"&&<Payments {...props}/>}
      {tab==="paylist"&&<PayList {...props}/>}
      {tab==="users"&&IS_ADMIN&&<Users/>}
    </main>
    <nav style={{position:"fixed",bottom:0,left:0,right:0,zIndex:100,background:"#0f1d32",borderTop:"1px solid #1e3a5f",display:"flex",justifyContent:"space-around",alignItems:"center",padding:"6px 0 8px"}}>
      {TABS.map(t=>{const a=tab===t.id;return(<button key={t.id} onClick={()=>setTab(t.id)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,background:"none",border:"none",cursor:"pointer",padding:"6px 6px",minWidth:44,position:"relative",fontFamily:"'DM Sans',sans-serif"}}>
        {a&&<div style={{position:"absolute",top:-1,left:"50%",transform:"translateX(-50%)",width:28,height:3,borderRadius:"0 0 3px 3px",background:"linear-gradient(90deg,#2563eb,#1d4ed8)"}}/>}
        <span style={{fontSize:18,lineHeight:1,filter:a?"none":"grayscale(1) opacity(0.5)"}}>{t.icon}</span>
        <span style={{fontSize:7,fontWeight:a?800:500,color:a?"#3b82f6":"#64748b"}}>{t.label}</span>
      </button>);})}
    </nav>
  </div>);
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
