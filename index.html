function useDB(table,fm){
  const[data,setData]=useState([]);const[loaded,setLoaded]=useState(false);
  const load=useCallback(async()=>{const{data:r}=await sb.from(table).select('*').order('created_at',{ascending:true});if(r)setData(r.map(row=>{const o={};Object.entries(fm).forEach(([k,c])=>{o[k]=row[c]});return o}));setLoaded(true)},[table]);
  useEffect(()=>{load()},[load]);
  const ins=useCallback(async item=>{const row={};Object.entries(fm).forEach(([k,c])=>{if(item[k]!==undefined)row[c]=item[k]});const{data:r}=await sb.from(table).insert(row).select().single();if(r){const o={};Object.entries(fm).forEach(([k,c])=>{o[k]=r[c]});setData(p=>[...p,o]);return o}return null},[table,fm]);
  const upd=useCallback(async(id,item)=>{const row={};Object.entries(fm).forEach(([k,c])=>{if(item[k]!==undefined)row[c]=item[k]});await sb.from(table).update(row).eq('id',id);setData(p=>p.map(d=>d.id===id?{...d,...item}:d))},[table,fm]);
  const del=useCallback(async id=>{await sb.from(table).delete().eq('id',id);setData(p=>p.filter(d=>d.id!==id))},[table]);
  return{data,loaded,insert:ins,update:upd,remove:del,reload:load}
}

function Mdl({open,onClose,title,children}){if(!open)return null;return(<div onClick={onClose} style={{position:"fixed",inset:0,zIndex:999,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(15,23,42,.6)",backdropFilter:"blur(4px)"}}><div onClick={e=>e.stopPropagation()} style={{background:"#1e293b",borderRadius:16,padding:"24px 28px",width:460,maxWidth:"94vw",maxHeight:"85vh",overflowY:"auto",color:"#e2e8f0"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}><h2 style={{margin:0,fontSize:17,fontWeight:700,color:"#f8fafc"}}>{title}</h2><button onClick={onClose} style={{background:"none",border:"none",color:"#94a3b8",fontSize:20,cursor:"pointer"}}>X</button></div>{children}</div></div>)}
function Cal({sel,onSel,items,df}){
  const[vd,setVd]=useState(()=>{const d=new Date(sel+"T12:00:00");return{y:d.getFullYear(),m:d.getMonth()}});
  const ds=useMemo(()=>{const s=new Set();items.forEach(l=>s.add(l[df||"date"]));return s},[items,df]);
  const dim=new Date(vd.y,vd.m+1,0).getDate(),fdw=new Date(vd.y,vd.m,1).getDay();
  const mn=new Date(vd.y,vd.m).toLocaleDateString("pt-BR",{month:"long",year:"numeric"});
  const cells=[];for(let i=0;i<fdw;i++)cells.push(null);for(let d=1;d<=dim;d++)cells.push(d);const ts=td();
  return(<div style={{background:"#1e293b",borderRadius:14,padding:16}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}><button onClick={()=>setVd(v=>{const d=new Date(v.y,v.m-1,1);return{y:d.getFullYear(),m:d.getMonth()}})} style={{background:"none",border:"none",color:"#94a3b8",fontSize:20,cursor:"pointer"}}>{"<"}</button><div style={{display:"flex",alignItems:"center",gap:10}}><span style={{fontSize:14,fontWeight:700,color:"#f8fafc",textTransform:"capitalize"}}>{mn}</span><button onClick={()=>{const n=new Date();setVd({y:n.getFullYear(),m:n.getMonth()});onSel(td())}} style={{background:"#2563eb22",border:"1px solid #2563eb44",borderRadius:6,color:"#3b82f6",fontSize:10,fontWeight:700,padding:"3px 8px",cursor:"pointer"}}>HOJE</button></div><button onClick={()=>setVd(v=>{const d=new Date(v.y,v.m+1,1);return{y:d.getFullYear(),m:d.getMonth()}})} style={{background:"none",border:"none",color:"#94a3b8",fontSize:20,cursor:"pointer"}}>{">"}</button></div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:4}}>{"DSTQQSS".split("").map((d,i)=><div key={i} style={{textAlign:"center",fontSize:10,fontWeight:700,color:"#64748b",padding:"4px 0"}}>{d}</div>)}</div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>{cells.map((day,i)=>{if(!day)return<div key={"e"+i}/>;const s=vd.y+"-"+String(vd.m+1).padStart(2,"0")+"-"+String(day).padStart(2,"0");const sl=s===sel,t=s===ts,hp=ds.has(s);return(<button key={day} onClick={()=>onSel(s)} style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"5px 2px",minHeight:36,borderRadius:8,cursor:"pointer",fontFamily:"'DM Sans'",background:sl?"linear-gradient(135deg,#2563eb,#1d4ed8)":hp?"#22c55e18":"transparent",border:t&&!sl?"1px solid #3b82f666":hp&&!sl?"1px solid #22c55e30":"1px solid transparent"}}><span style={{fontSize:12,fontWeight:sl||hp?700:400,color:sl?"#fff":t?"#3b82f6":hp?"#4ade80":"#cbd5e1"}}>{day}</span>{hp&&<div style={{width:4,height:4,borderRadius:"50%",background:sl?"#fff":"#22c55e",marginTop:1}}/>}</button>)})}</div></div>)
}

function PayDash({contractors:ct,projects:pj,contracts:co,payments:pm}){const act=pj.filter(p=>p.status==="ativo").length;const gp=cid=>pm.filter(p=>p.contractId===cid).reduce((s,p)=>s+(Number(p.amount)||0),0);return(<div><Crd style={{marginBottom:16,display:"flex",alignItems:"center",gap:14,padding:"16px 20px"}}><div style={{width:44,height:44,borderRadius:12,display:"flex",alignItems:"center",justifyContent:"center",background:"#2563eb22",fontSize:20}}>🏗️</div><div><div style={{fontSize:12,color:"#94a3b8",fontWeight:600}}>Obras Ativas</div><div style={{fontSize:20,fontWeight:800,color:"#f8fafc"}}>{act} <span style={{fontSize:12,color:"#64748b"}}>de {pj.length}</span></div></div></Crd><h3 style={{fontSize:15,fontWeight:700,color:"#f8fafc",marginBottom:12}}>Resumo dos Contratos</h3>{co.length===0?<Crd><p style={{color:"#64748b",fontSize:13}}>Nenhum contrato.</p></Crd>:<div style={{display:"grid",gap:10}}>{co.map(c=>{const cn=ct.find(x=>x.id===c.contractorId);const pr=pj.find(x=>x.id===c.projectId);const pd=gp(c.id);const pc=c.totalValue>0?Math.min(100,(pd/c.totalValue)*100):0;return(<Crd key={c.id} style={{padding:"14px 18px"}}><div style={{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:6}}><div><div style={{fontWeight:700,fontSize:14,color:"#f8fafc"}}>{cn?.name||"-"}</div><div style={{fontSize:11,color:"#94a3b8",marginTop:2}}>{pr?.name||"-"}{c.description&&" - "+c.description}</div></div><Bdg type={c.type}/></div><div style={{marginTop:10,display:"flex",alignItems:"center",gap:12}}><div style={{padding:"6px 12px",borderRadius:8,background:"#22c55e15",border:"1px solid #22c55e25"}}><div style={{fontSize:8,color:"#86efac",fontWeight:700}}>PAGO</div><div style={{fontSize:15,fontWeight:800,color:"#22c55e"}}>{fmt(pd)}</div></div>{c.type==="fechado"&&c.totalValue>0&&<div style={{flex:1}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}><span style={{fontSize:10,color:"#64748b"}}>de {fmt(c.totalValue)}</span><span style={{font function PayEmpr({contractors:ct,cApi}){const[m,setM]=useState(false);const[ed,setEd]=useState(null);const[f,setF]=useState({name:"",cpf:"",bank:"",bankAgency:"",bankAccount:"",pixKey:""});const[q,setQ]=useState("");const sv=async()=>{if(!f.name)return;if(ed){await cApi.update(ed,f);log("editou","pay","Empreiteiro: "+f.name)}else{await cApi.insert({...f,id:genId()});log("criou","pay","Empreiteiro: "+f.name)}setM(false)};const fl=ct.filter(c=>c.name?.toLowerCase().includes(q.toLowerCase()));return(<div><div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap"}}><input placeholder="Buscar..." value={q} onChange={e=>setQ(e.target.value)} style={{...iS,flex:1,minWidth:180}}/><button onClick={()=>{setF({name:"",cpf:"",bank:"",bankAgency:"",bankAccount:"",pixKey:""});setEd(null);setM(true)}} style={bP}>+ Novo</button></div>{fl.length===0?<Crd><p style={{color:"#64748b",fontSize:13,textAlign:"center"}}>Nenhum empreiteiro.</p></Crd>:<div style={{display:"grid",gap:10}}>{fl.map(c=>(<Crd key={c.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10,padding:"14px 18px"}}><div><div style={{fontWeight:700,fontSize:14,color:"#f8fafc"}}>{c.name}</div><div style={{fontSize:11,color:"#94a3b8",marginTop:3}}>CPF: {c.cpf} {c.bank&&"| "+c.bank} | Ag: {c.bankAgency} | Ct: {c.bankAccount}</div>{c.pixKey&&<div style={{fontSize:11,color:"#64748b"}}>Pix: {c.pixKey}</div>}</div><div style={{display:"flex",gap:6}}><button onClick={()=>{setF({name:c.name,cpf:c.cpf||"",bank:c.bank||"",bankAgency:c.bankAgency||"",bankAccount:c.bankAccount||"",pixKey:c.pixKey||""});setEd(c.id);setM(true)}} style={{...bSc,padding:"5px 12px",fontSize:11}}>Editar</button><button onClick={async()=>{await cApi.remove(c.id);log("removeu","pay","Empreiteiro: "+c.name)}} style={{...bSc,padding:"5px 12px",fontSize:11,borderColor:"#ef4444",color:"#ef4444"}}>X</button></div></Crd>))}</div>}<Mdl open={m} onClose={()=>setM(false)} title={ed?"Editar":"Novo Empreiteiro"}><Fl tyle={iS} value={f.description} onChange={e=>setF({...f,description:e.target.value})}/></Fl><div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:16}}><button onClick={()=>setM(false)} style={bSc}>Cancelar</button><button onClick={sv} style={bP}>{ed?"Salvar":"Criar"}</button></div></Mdl></div>)}

function PayPgto({contractors:ct,projects:pj,contracts:co,payments:pm,pmApi}){const[m,setM]=useState(false);const[f,setF]=useState({contractId:"",amount:0,date:td()});const[fd,setFd]=useState(td());const[co2,setCo2]=useState(false);const sv=async()=>{if(!f.contractId||!f.amount)return;await pmApi.insert({...f,id:genId(),amount:Number(f.amount)});const cn=ct.find(x=>x.id===co.find(c=>c.id===f.contractId)?.contractorId)?.name||"";log("criou","pay","Pagamento "+fmt(f.amount)+" - "+cn);setM(false)};const fl=pm.filter(p=>p.date===fd);const dt=fl.reduce((s,p)=>s+(Number(p.amount)||0),0);const gl=c=>{const cn=ct.find(x=>x.id===c.contractorId);const pr=pj.find(x=>x.id===c.projectId);return(cn?.name||"?")+" | "+(pr?.name||"?")+(c.description?" - "+c.description:"")};return(<div><div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap",alignItems:"flex-end"}}><div><label style={lSt}>Data</label><button onClick={()=>setCo2(!co2)} style={{...iS,width:180,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between"}}><span>{fmtD(fd)}</span><span style={{fontSize:10,color:"#64748b"}}>{co2?"^":"v"}</span></button></div><div style={{flex:1}}/><button onClick={()=>{setF({contractId:co[0]?.id||"",amount:0,date:fd});setM(true)}} style={{...bP,marginBottom:16}}>+ Pagamento</button></div>{co2&&<div style={{marginBottom:16,maxWidth:360}}><Cal sel={fd} onSel={d=>{setFd(d);setCo2(false)}} items={pm} df="date"/></div>}<div style={{fontSize:12,color:"#94a3b8",marginBottom:12}}>{fmtD(fd)} {fl.length>0&&<span>| Total: <strong style={{color:"#22c55e"}}>{fmt(dt)}</strong></span>}</div>{fl.length===0?<Crd><p style={{color:"#64748b",fontSize:13,textAlign:"center"}}>Nenhum pagamento.</p></Crd>:<div style={{display:"grid",gap:6}}>{fl.map(p=>{const c=co.find(x=>x.id===p.contractId);const cn=ct.find(x=>x.id===c?.contractorId);return(<div key={p.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 14px",borderRadius:8,background:"#1e function PayLista({contractors:ct,projects:pj,contracts:co,payments:pm}){
  const[sd,setSd]=useState(td());const[sp,setSp]=useState("all");const[calO,setCalO]=useState(false);
  const dp=pm.filter(p=>p.date===sd&&(sp==="all"||co.find(c=>c.id===p.contractId)?.projectId===sp));
  const g={};dp.forEach(p=>{const c=co.find(x=>x.id===p.contractId);if(!c)return;const cn=ct.find(x=>x.id===c.contractorId);if(!cn)return;if(!g[cn.id])g[cn.id]={contractor:cn,items:[],total:0};const pr=pj.find(x=>x.id===c.projectId);g[cn.id].items.push({...p,project:pr?.name||"-",desc:c.description||""});g[cn.id].total+=Number(p.amount)||0});
  const entries=Object.values(g);const gt=entries.reduce((s,e)=>s+e.total,0);
  const wa=()=>{let m="*GUERREIRA PAY*\n*Lista de Pagamento*\nData: *"+fmtD(sd)+"*\n--------------------------------\n\n";entries.forEach(e=>{m+="*"+e.contractor.name+"*\nCPF: "+(e.contractor.cpf||"")+"\n";if(e.contractor.bank)m+="Banco: "+e.contractor.bank+"\n";m+="Ag: "+(e.contractor.bankAgency||"")+" | Conta: "+(e.contractor.bankAccount||"")+"\n";if(e.contractor.pixKey)m+="Pix: "+e.contractor.pixKey+"\n";m+="\n";e.items.forEach(i=>{const ref=i.desc?" - ref. "+i.desc:"";m+="Obra: "+i.project+"\nValor: *"+fmt(i.amount)+"*"+ref+"\n"});if(e.items.length>1)m+="\nSubtotal: *"+fmt(e.total)+"*\n";m+="\n"});m+="--------------------------------\n*TOTAL GERAL: "+fmt(gt)+"*\n\n_Guerreira Pay_";window.open("https://wa.me/?text="+encodeURIComponent(m),"_blank")};
  return(<div>
    <Crd style={{marginBottom:16}}><div style={{display:"flex",gap:12,alignItems:"flex-end",flexWrap:"wrap"}}><div><label style={lSt}>Data</label><button onClick={()=>setCalO(!calO)} style={{...iS,width:180,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between"}}><span>{fmtD(sd)}</span><span style={{fontSize:10,color:"#64748b"}}>{calO?"^":"v"}</span></button></div><Fl label="Obra"><select style={{...iS,width:200}} value={sp} onChange={e=>setSp(e.target.value)}><option value="all">Todas</option>{pj.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}</select></Fl><button onClick={wa} style={{...bP,background:"linear-gradient(135deg,#25D366,#128C7E)",marginBottom:16}} disabled={!entries.length}>WhatsApp</button></div>{calO&&<div style={{marginTop:12,maxWidth:360}}><Cal sel={sd} onSel={d=>{setSd(d);setCalO(false)}} items={pm} df="date"/></div>}</Crd>
    {!entries.length?<Crd><p style={{color:"#64748b",fontSize:13,textAlign:"center"}}>Nenhum pagamento para {fmtD(sd)}.</p></Crd>:
    <Crd><h3 style={{margin:"0 0 4px",fontSize:15,fontWeight:700,color:"#f8fafc"}}>Lista - {fmtD(sd)}</h3><p style={{margin:"0 0 14px",fontSize:12,color:"#64748b"}}>{entries.length} empreiteiro(s) | Total: {fmt(gt)}</p>
    <div style={{display:"grid",gap:14}}>{entries.map(e=>(<div key={e.contractor.id} style={{padding:14,borderRadius:10,background:"#0f172a",border:"1px solid #1e293b"}}><div style={{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:8,marginBottom:10}}><div><div style={{fontWeight:700,fontSize:14,color:"#f8fafc"}}>{e.contractor.name}</div><div style={{fontSize:11,color:"#94a3b8",marginTop:2}}>CPF: {e.contractor.cpf}{e.contractor.bank&&" | "+e.contractor.bank}</div><div style={{fontSize:11,color:"#64748b"}}>Ag: {e.contractor.bankAgency} | Ct: {e.contractor.bankAccount}{e.contractor.pixKey&&" | Pix: "+e.contractor.pixKey}</div></div>{e.items.length>1&&<div style={{padding:"4px 10px",borderRadius:8,background:"#3b82f618",border:"1px solid #3b82f633"}}><span style={{fontSize:12,fontWeight:700,color:"#3b82f6"}}>Subtotal: {fmt(e.total)}</span></div>}</div><div style={{display:"grid",gap:6}}>{e.items.map(i=>(<div key={i.id} style={{padding:"8px 12px",borderRadius:8,background:"#1e293b",border:"1px solid #334155"}}><div style={{fontSize:12,fontWeight:600,color:"#cbd5e1",marginBottom:3}}>{i.project}</div><div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:15,fontWeight:800,color:"#22c55e"}}>{fmt(i.amount)}</span>{i.desc&&<span style={{fontSize:11,color:"#94a3b8"}}>ref. {i.desc}</span>}</div></div>))}</div></div>))}</div>
    <div style={{marginTop:14,padding:"12px 16px",borderRadius:10,background:"linear-gradient(135deg,#3b82f618,#1d4ed810)",border:"1px solid #3b82f633",display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontSize:14,fontWeight:700,color:"#3b82f6"}}>TOTAL GERAL</span><span style={{fontSize:18,fontWeight:800,color:"#3b82f6"}}>{fmt(gt)}</span></div></Crd>}
  </div>)
}

  const[em,setEm]=useState('');const[pw,setPw]=useState('');const[er,setEr]=useState('');const[ld,setLd]=useState(false);
  const go=async e=>{e.preventDefault();if(!em||!pw){setEr('Preencha todos os campos.');return}setLd(true);setEr('');try{const{data,error}=await sb.auth.signInWithPassword({email:em,password:pw});if(error)throw error;onOk(data.user)}catch(x){setEr(x.message.includes('Invalid login')?'E-mail ou senha incorretos.':x.message)}setLd(false)};
  return(<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"linear-gradient(135deg,#0a1628,#0f1d32)",padding:20}}><div style={{background:"#1e293b",borderRadius:20,padding:"40px 32px",width:400,maxWidth:"100%"}}><div style={{textAlign:"center",marginBottom:28}}><AppLogo size={80}/></div><div style={{fontSize:22,fontWeight:800,color:"#f8fafc",textAlign:"center",marginBottom:4}}>Guerreira Construtora</div><div style={{fontSize:11,color:"#64748b",textAlign:"center",marginBottom:28,textTransform:"uppercase",letterSpacing:1.5,fontWeight:600}}>Sistema de Gestao</div>{er&&<div style={{background:"#ef444422",border:"1px solid #ef444444",borderRadius:8,padding:"10px 14px",color:"#fca5a5",fontSize:13,marginBottom:14,textAlign:"center"}}>{er}</div>}<form onSubmit={go}><label style={lSt}>E-mail</label><input style={{width:"100%",padding:"12px 16px",background:"#0f172a",border:"1px solid #334155",borderRadius:10,color:"#e2e8f0",fontSize:16,fontFamily:"'DM Sans',sans-serif",outline:"none",marginBottom:14}} type="email" value={em} onChange={e=>setEm(e.target.value)} placeholder="seu@email.com" required/><label style={lSt}>Senha</label><input style={{width:"100%",padding:"12px 16px",background:"#0f172a",border:"1px solid #334155",borderRadius:10,color:"#e2e8f0",fontSize:16,fontFamily:"'DM Sans',sans-serif",outline:"none",marginBottom:14}} type="password" value={pw} onChange={e=>setPw(e.target.value)} placeholder="Sua senha" required/><button style={{width:"100%",padding:"14px",background:"linear-gradient(135deg,#2563eb,#1d4ed8)",border:"none",borderRadius:10,color:"#fff",fontSize:16,fontWeight:700,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",marginTop:6,opacity:ld?.5:1}} type="submit" disabled={ld}>{ld?'Entrando...':'Entrar'}</button></form></div></div>)
}

// ═══ MENU ═══
function Menu({onPick,user,logs}){
  const nm=user?.user_metadata?.name||user?.email?.split('@')[0]||'Usuario';
  const[showLogs,setShowLogs]=useState(false);
  return(<div style={{minHeight:"100vh",background:"linear-gradient(135deg,#0a1628,#0f1d32)",padding:24}}>
    {showLogs?<div><div style={{display:"flex",alignItems:"center",gap:8,marginBottom:20}}><button onClick={()=>setShowLogs(false)} style={{background:"none",border:"none",color:"#3b82f6",fontSize:18,cursor:"pointer"}}>{"<"}</button><div style={{fontWeight:800,fontSize:16,color:"#f8fafc"}}>Log de Atividades</div></div><LogsView logs={logs}/></div>:
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"calc(100vh - 48px)"}}>
      <AppLogo size={80}/>
      <h1 style={{fontSize:22,fontWeight:800,color:"#f8fafc",marginTop:16,marginBottom:4}}>Guerreira Construtora</h1>
      <p style={{fontSize:11,color:"#64748b",marginBottom:8,textTransform:"uppercase",letterSpacing:1.5,fontWeight:600}}>Selecione o modulo</p>
      <p style={{fontSize:11,color:"#94a3b8",marginBottom:28}}>{nm}</p>
      <div style={{display:"grid",gap:16,width:"100%",maxWidth:400}}>
        <button onClick={()=>onPick("pay")} style={{background:"#1e293b",border:"1px solid #1e3a5f",borderRadius:16,padding:"28px 24px",cursor:"pointer",textAlign:"left"}}><div style={{display:"flex",alignItems:"center",gap:14}}><div style={{width:52,height:52,borderRadius:14,background:"linear-gradient(135deg,#2563eb22,#1d4ed822)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:26}}>💰</div><div><div style={{fontSize:17,fontWeight:800,color:"#f8fafc"}}>Guerreira Pay</div><div style={{fontSize:12,color:"#94a3b8",marginTop:2}}>Pagamentos de empreiteiros</div></div></div></button>
        <button onClick={()=>onPick("trans")} style={{background:"#1e293b",border:"1px solid #1e3a5f",borderRadius:16,padding:"28px 24px",cursor:"pointer",textAlign:"left"}}><div style={{display:"flex",alignItems:"center",gap:14}}><div style={{width:52,height:52,borderRadius:14,background:"linear-gradient(135deg,#22c55e22,#16a34a22)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:26}}>🚌</div><div><div style={{fontSize:17,fontWeight:800,color:"#f8fafc"}}>Guerreira Transporte</div><div style={{fontSize:12,color:"#94a3b8",marginTop:2}}>Controle de passagens</div></div></div></button>
        <button onClick={()=>setShowLogs(true)} style={{background:"#1e293b",border:"1px solid #1e3a5f",borderRadius:16,padding:"20px 24px",cursor:"pointer",textAlign:"left"}}><div style={{display:"flex",alignItems:"center",gap:14}}><div style={{width:42,height:42,borderRadius:12,background:"linear-gradient(135deg,#f59e0b22,#d97706aa)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>📋</div><div><div style={{fontSize:14,fontWeight:700,color:"#f8fafc"}}>Log de Atividades</div><div style={{fontSize:11,color:"#94a3b8",marginTop:1}}>Historico de acoes</div></div></div></button>
      </div>
      <button onClick={async()=>{await sb.auth.signOut();location.reload()}} style={{marginTop:24,background:"none",border:"1px solid #334155",borderRadius:8,padding:"8px 20px",color:"#f87171",fontSize:12,cursor:"pointer",fontWeight:600,fontFamily:"'DM Sans'"}}>Sair</button>
    </div>}
  </div>)
}

// ═══ ROOT ═══
function Root(){
  const[user,setUser]=useState(null);const[ck,setCk]=useState(true);const[mod,setMod]=useState(null);
  const logApi=useDB('activity_logs',{id:'id',usuario:'usuario',acao:'acao',categoria:'categoria',descricao:'descricao',hora:'hora',modulo:'modulo'});

  // Set global log function
  useEffect(()=>{
    _logFn=(acao,cat,desc)=>{
      const nm=user?.user_metadata?.name||user?.email?.split('@')[0]||'Usuario';
      logApi.insert({id:genId(),usuario:nm,acao,categoria:cat,descricao:desc,hora:nowStr(),modulo:cat});
    };
    return()=>{_logFn=null};
  },[user,logApi.insert]);

  // Auth check - force login if no valid session
  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>{
      if(session?.user){setUser(session.user)}
      else{setUser(null)}
      setCk(false)
    });
  },[]);

  if(ck)return(<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:"#0a1628"}}><div style={{textAlign:"center"}}><AppLogo size={80}/><div style={{width:32,height:32,border:"3px solid #334155",borderTopColor:"#2563eb",borderRadius:"50%",animation:"spin .7s linear infinite",margin:"16px auto"}}/></div></div>);
  if(!user)return<Login onOk={setUser}/>;
  if(!mod)return<Menu onPick={setMod} user={user} logs={logApi.data}/>;
  if(mod==="pay")return<PayMod onBack={()=>setMod(null)}/>;
  if(mod==="trans")return<TransMod onBack={()=>setMod(null)}/>;
  return null
}
ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
</body>
</html>
