 lancamento de manutencao.</p></Crd>:<div style={{display:"grid",gap:10}}>{Object.values(gr).map((g,i)=>(<Crd key={i} style={{padding:"12px 14px"}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><span style={{fontWeight:700,fontSize:12,color:"#f8fafc"}}>{g.obra?.cliente||"-"}</span><span style={{fontWeight:700,color:"#3b82f6",fontSize:12}}>{fmt(g.total)}</span></div><div style={{display:"grid",gap:3}}>{g.items.map((l,idx)=>(<div key={l.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 10px",borderRadius:6,background:"#0f172a"}}><div style={{display:"flex",alignItems:"center",gap:6}}><span style={{fontSize:10,fontWeight:700,color:"#ef4444",minWidth:16}}>{idx+1}.</span><div><span style={{fontSize:11,fontWeight:600,color:"#f8fafc"}}>{l.fn}</span>{l.fc&&<span style={{fontSize:9,color:"#94a3b8"}}> - {l.fc}</span>}</div></div><div style={{display:"flex",alignItems:"center",gap:4}}><span style={{fontWeight:700,color:"#22c55e",fontSize:12}}>{fmt(l.valor)}</span>{l.fci&&<span style={{fontSize:9,color:"#64748b"}}>{l.fci}</span>}{canDel(l)&&<button onClick={async()=>{await lApi.remove(l.id);log("removeu","transporte","Manut. "+l.fn);await lApi.reload()}} style={{background:"none",border:"none",color:"#ef4444",cursor:"pointer",fontSize:10}}>X</button>}</div></div>))}</div></Crd>))}</div>}</div>)}
function TransMod({onBack,role}){const[tab,setTab]=useState("obras");const oApi=useDB('obras',{id:'id',cliente:'cliente',endereco:'endereco',ativa:'ativa'});const fApi=useDB('funcionarios',{id:'id',nome:'nome',cpf:'cpf',cidade:'cidade',tipo:'tipo',cargo:'cargo',equipe:'equipe',obraId:'obra_id'});const tApi=useDB('trechos',{id:'id',funcionarioId:'funcionario_id',descricao:'descricao',valorIda:'valor_ida',valorVolta:'valor_volta'});const lApi=useDB('lancamentos',{id:'id',obraId:'obra_id',funcionarioId:'funcionario_id',data:'data',valor:'valor',tipo:'tipo',descricao:'descricao',comprovanteUrl:'comprovante_url'});const ld=oApi.loaded&&fApi.loaded&&tApi.loaded&&lApi.loaded;useEffect(()=>{const i=setInterval(()=>{oApi.reload();fApi.reload();tApi.reload();lApi.reload()},30000);return()=>clearInterval(i)},[]);const pr={obras:oApi.data,funcionarios:fApi.data,trechos:tApi.data,lancamentos:lApi.data,oApi,fApi,tApi,lApi,role};if(!ld)return(<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:"#0a1628"}}><AppLogo size={50}/></div>);const tabs=role==="administrativo"?TT.filter(t=>t.id!=="fin"):TT;return(<div style={{paddingBottom:60}}><Hdr title="Guerreira Transporte" onBack={onBack}/><main style={{padding:"12px"}}>{tab==="obras"&&<TObras {...pr}/>}{tab==="func"&&<TFunc {...pr}/>}{tab==="lanc"&&<TLanc {...pr}/>}{tab==="manut"&&<TManut {...pr}/>}{tab==="fin"&&role!=="administrativo"&&<TFin {...pr}/>}</main><Nav tabs={tabs} tab={tab} setTab={setTab}/></div>)}
function LogsView({logs}){const[fi,setFi]=useState("all");const fl=fi==="all"?logs:logs.filter(l=>l.categoria===fi);return(<div><div style={{display:"flex",gap:6,marginBottom:12}}>{"all,pay,transporte".split(",").map(t=>(<button key={t} onClick={()=>setFi(t)} style={{padding:"4px 12px",borderRadius:6,fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"'DM Sans'",background:fi===t?"#2563eb":"#1e293b",color:fi===t?"#fff":"#94a3b8",border:fi===t?"none":"1px solid #334155"}}>{t==="all"?"Todos":t==="pay"?"Pay":"Transporte"}</button>))}</div>{fl.length===0?<Crd><p style={{color:"#64748b",fontSize:12,textAlign:"center"}}>Nenhuma atividade.</p></Crd>:<div style={{display:"grid",gap:4}}>{[...fl].reverse().map(l=>{const cores={criou:"#22c55e",editou:"#3b82f6",removeu:"#ef4444",lancou:"#f59e0b"};const cor=cores[l.acao]||"#94a3b8";return(<div key={l.id} style={{padding:"8px 12px",borderRadius:6,background:"#1e293b",display:"flex",justifyContent:"space-between",gap:6}}><div><div style={{display:"flex",alignItems:"center",gap:4,marginBottom:2}}><span style={{fontSize:11,fontWeight:700,color:"#f8fafc"}}>{l.usuario}</span><span style={{padding:"1px 5px",borderRadius:4,fontSize:8,fontWeight:700,background:cor+"22",color:cor}}>{l.acao}</span></div><div style={{fontSize:10,color:"#94a3b8"}}>{l.descricao}</div></div><div style={{fontSize:9,color:"#475569",whiteSpace:"nowrap"}}>{l.hora}</div></div>)})}</div>}</div>)}
function UsersPage(){const[nm,setNm]=useState("");const[em,setEm]=useState("");const[pw,setPw]=useState("");const[rl,setRl]=useState("administrativo");const[msg,setMsg]=useState("");const[err,setErr]=useState("");const uApi=useDB('app_users',{id:'id',email:'email',name:'name',role:'role'});const cr=async e=>{e.preventDefault();setMsg("");setErr("");if(!nm||!em||!pw){setErr("Preencha todos.");return}if(pw.length<6){setErr("Senha min 6 chars.");return}try{const{error}=await sb.auth.signUp({email:em,password:pw,options:{data:{name:nm,role:rl}}});if(error)throw error;await uApi.insert({id:em,email:em,name:nm,role:rl});log("criou","sistema","Usuario: "+nm+" ("+rl+")");setMsg(nm+" criado ("+rl+")!");setNm("");setEm("");setPw("")}catch(x){setErr(x.message)}};const chRole=async(u,nr)=>{if(u.email===MASTER_EMAIL)return;await uApi.update(u.id,{...u,role:nr});log("editou","sistema","Role "+u.name+": "+nr)};const rbC={master:{bg:"#f59e0b22",c:"#f59e0b"},financeiro:{bg:"#3b82f622",c:"#3b82f6"},administrativo:{bg:"#22c55e22",c:"#22c55e"}};return(<div><Crd style={{marginBottom:10}}><div style={{fontSize:13,fontWeight:700,color:"#f8fafc",marginBottom:10}}>Usuarios Cadastrados</div>{uApi.data.length===0?<p style={{color:"#64748b",fontSize:11}}>Nenhum usuario na tabela. Crie abaixo.</p>:<div style={{display:"grid",gap:6}}>{uApi.data.map(u=>{const r=u.email===MASTER_EMAIL?"master":u.role||"administrativo";const rc=rbC[r]||rbC.administrativo;const isMaster=u.email===MASTER_EMAIL;return(<div key={u.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 12px",borderRadius:8,background:"#0f172a",flexWrap:"wrap",gap:6}}><div><div style={{display:"flex",alignItems:"center",gap:6}}><span style={{fontSize:12,fontWeight:700,color:"#f8fafc"}}>{u.name||u.email}</span><span style={{padding:"1px 6px",borderRadius:6,fontSize:8,fontWeight:700,background:rc.bg,color:rc.c}}>{r}</span></div><div style={{fontSize:9,color:"#64748b"}}>{u.email}</div></div>{!isMaster&&<s function Login({onOk}){const[em,setEm]=useState('');const[pw,setPw]=useState('');const[er,setEr]=useState('');const[ld,setLd]=useState(false);const go=async e=>{e.preventDefault();if(!em||!pw){setEr('Preencha todos.');return}setLd(true);setEr('');try{const{data,error}=await sb.auth.signInWithPassword({email:em,password:pw});if(error)throw error;onOk(data.user)}catch(x){setEr(x.message.includes('Invalid login')?'E-mail ou senha incorretos.':x.message)}setLd(false)};return(<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"linear-gradient(135deg,#0a1628,#0f1d32)",padding:20}}><div style={{background:"#1e293b",borderRadius:18,padding:"28px 22px",width:360,maxWidth:"100%"}}><div style={{textAlign:"center",marginBottom:20}}><AppLogo size={60}/></div><div style={{fontSize:18,fontWeight:800,color:"#f8fafc",textAlign:"center",marginBottom:2}}>Guerreira Construtora</div><div style={{fontSize:9,color:"#64748b",textAlign:"center",marginBottom:20,textTransform:"uppercase",letterSpacing:1.5,fontWeight:600}}>Sistema de Gestao</div>{er&&<div style={{background:"#ef444422",borderRadius:6,padding:"6px 10px",color:"#fca5a5",fontSize:10,marginBottom:10,textAlign:"center"}}>{er}</div>}<form onSubmit={go}><label style={lSt}>E-mail</label><input style={{...iS,fontSize:15,padding:"10px 14px",marginBottom:10}} type="email" value={em} onChange={e=>setEm(e.target.value)} placeholder="seu@email.com" required/><label style={lSt}>Senha</label><input style={{...iS,fontSize:15,padding:"10px 14px",marginBottom:10}} type="password" value={pw} onChange={e=>setPw(e.target.value)} placeholder="Sua senha" required/><button style={{width:"100%",padding:"11px",background:"linear-gradient(135deg,#2563eb,#1d4ed8)",border:"none",borderRadius:10,color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"'DM Sans'",marginTop:4,opacity:ld?.5:1}} type="submit" disabled={ld}>{ld?'Entrando...':'Entrar'}</button></form></div></div>)}
function Menu({onPick,user,logs,role}){const nm=user?.user_metadata?.name||user?.email?.split('@')[0]||'?';const[view,setView]=useState(null);const rb={master:{bg:"#f59e0b22",c:"#f59e0b",l:"Master"},financeiro:{bg:"#3b82f622",c:"#3b82f6",l:"Financeiro"},administrativo:{bg:"#22c55e22",c:"#22c55e",l:"Administrativo"}}[role]||{bg:"#22c55e22",c:"#22c55e",l:"Adm"};if(view==="logs")return(<div style={{minHeight:"100vh",background:"#0f172a"}}><Hdr title="Log de Atividades" onBack={()=>setView(null)}/><div style={{padding:12}}><LogsView logs={logs}/></div></div>);if(view==="users")return(<div style={{minHeight:"100vh",background:"#0f172a"}}><Hdr title="Usuarios" onBack={()=>setView(null)}/><div style={{padding:12}}><UsersPage/></div></div>);if(view==="financeiro")return(<div style={{minHeight:"100vh",background:"#0f172a"}}><Hdr title="Financeiro" onBack={()=>setView(null)}/><div style={{padding:12}}><Crd><p style={{color:"#64748b",fontSize:12,textAlign:"center"}}>Em construcao...</p></Crd></div></div>);return(<div style={{minHeight:"100vh",background:"linear-gradient(135deg,#0a1628,#0f1d32)",padding:"16px 14px"}}><div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"calc(100vh - 32px)"}}><AppLogo size={60}/><h1 style={{fontSize:18,fontWeight:800,color:"#f8fafc",marginTop:12,marginBottom:2}}>Guerreira Construtora</h1><div style={{display:"flex",alignItems:"center",gap:6,marginBottom:20}}><span style={{fontSize:11,color:"#94a3b8"}}>{nm}</span><span style={{padding:"2px 8px",borderRadius:10,fontSize:9,fontWeight:700,background:rb.bg,color:rb.c}}>{rb.l}</span></div><div style={{display:"grid",gap:10,width:"100%",maxWidth:360}}><button onClick={()=>onPick("pay")} style={{background:"#1e293b",border:"1px solid #1e3a5f",borderRadius:12,padding:"20px 18px",cursor:"pointer",textAlign:"left"}}><div style={{display:"flex",alignItems:"center",gap:12}}><div style={{width:40,height:40,borderRadius:10,background:"#2563eb22",display:"flex
